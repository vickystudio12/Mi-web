<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Electricista Pro</title>
<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center}
#board {margin:20px auto; width:300px; height:400px; background:#1e293b; border-radius:20px; padding:20px}
.socket, .cable {width:60px; height:60px; border-radius:10px; margin:10px; display:inline-block}
.socket {background:#334155}
.cable {cursor:pointer}
.red {background:red}
.blue {background:blue}
.yellow {background:yellow}
.green {background:green}
.correct {box-shadow:0 0 20px lime}
.wrong {box-shadow:0 0 20px red}
button {padding:10px 20px; border:none; border-radius:10px; background:#22c55e; color:white; font-size:16px}
</style>
</head>
<body>
<h1>⚡ Simulador Electricista</h1>
<p>Conectá correctamente los cables</p>

<div id="board">
<div id="sockets"></div>
<div id="cables"></div>
</div>

<button onclick="checkConnections()">Verificar</button>
<p id="result"></p>

<script>
const colors = ['red','blue','yellow','green'];
let selectedCable = null;
let connections = {};

const socketsDiv = document.getElementById('sockets');
const cablesDiv = document.getElementById('cables');

colors.forEach(color => {
  const socket = document.createElement('div');
  socket.className = 'socket';
  socket.dataset.color = color;
  socket.onclick = () => connect(socket);
  socketsDiv.appendChild(socket);

  const cable = document.createElement('div');
  cable.className = 'cable ' + color;
  cable.onclick = () => selectCable(color);
  cablesDiv.appendChild(cable);
});

function selectCable(color){
  selectedCable = color;
}

function connect(socket){
  if(!selectedCable) return;
  connections[socket.dataset.color] = selectedCable;
  socket.style.background = selectedCable;
}

function checkConnections(){
  let correct = 0;
  document.querySelectorAll('.socket').forEach(socket => {
    const expected = socket.dataset.color;
    const actual = connections[expected];

    socket.classList.remove('correct','wrong');

    if(expected === actual){
      socket.classList.add('correct');
      correct++;
    } else {
      socket.classList.add('wrong');
    }
  });

  const result = document.getElementById('result');
  if(correct === colors.length){
    result.innerText = '✅ Perfecto! Instalación correcta';
  } else {
    result.innerText = '❌ Hay errores en la conexión';
  }
}
</script>
</body>
</html>
